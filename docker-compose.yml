version: '3.8'

services:
  hiremind:
    build: .
    container_name: hiremind-ai-service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super-secret-random-jwt-key-2026}
      - APP_URL=${APP_URL:-http://localhost:3000}
    restart: always
